name: Test SARIF Upload

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fake-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Create fake SARIF
        run: |
          cat > results.sarif << 'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": {
                "driver": {
                  "name": "FakeScanner",
                  "version": "1.0.0",
                  "rules": [
                    {"id": "FAKE-001", "shortDescription": {"text": "Test finding for notification pipeline"}, "defaultConfiguration": {"level": "error"}},
                    {"id": "FAKE-002", "shortDescription": {"text": "Second test finding - warning level"}, "defaultConfiguration": {"level": "warning"}},
                    {"id": "FAKE-003", "shortDescription": {"text": "Third finding - tests tasklist tracking"}, "defaultConfiguration": {"level": "error"}},
                    {"id": "FAKE-004", "shortDescription": {"text": "Fourth finding - tests GraphQL issue linking"}, "defaultConfiguration": {"level": "warning"}},
                    {"id": "FAKE-005", "shortDescription": {"text": "Fifth finding - final E2E validation"}, "defaultConfiguration": {"level": "error"}}
                  ]
                }
              },
              "results": [
                {"ruleId": "FAKE-001", "level": "error", "message": {"text": "Fake error."}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": "README.md"}, "region": {"startLine": 1}}}]},
                {"ruleId": "FAKE-002", "level": "warning", "message": {"text": "Fake warning."}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": "README.md"}, "region": {"startLine": 2}}}]},
                {"ruleId": "FAKE-003", "level": "error", "message": {"text": "Fake error 3."}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": "README.md"}, "region": {"startLine": 3}}}]},
                {"ruleId": "FAKE-004", "level": "warning", "message": {"text": "Fourth."}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": "README.md"}, "region": {"startLine": 4}}}]},
                {"ruleId": "FAKE-005", "level": "error", "message": {"text": "Final E2E test."}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": "README.md"}, "region": {"startLine": 5}}}]}
              ]
            }]
          }
          EOF

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84
        with:
          sarif_file: results.sarif
          category: fake-scanner-test
