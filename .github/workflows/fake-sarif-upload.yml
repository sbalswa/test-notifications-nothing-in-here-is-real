name: Test SARIF Upload

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fake-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Create fake SARIF
        run: |
          cat > results.sarif << 'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": {
                "driver": {
                  "name": "FakeScanner",
                  "version": "1.0.0",
                  "rules": [
                    {
                      "id": "FAKE-001",
                      "shortDescription": { "text": "Test finding for notification pipeline" },
                      "defaultConfiguration": { "level": "error" }
                    },
                    {
                      "id": "FAKE-002",
                      "shortDescription": { "text": "Second test finding - warning level" },
                      "defaultConfiguration": { "level": "warning" }
                    }
                  ]
                }
              },
              "results": [
                {
                  "ruleId": "FAKE-001",
                  "level": "error",
                  "message": { "text": "This is a fake finding to test the security event handler pipeline." },
                  "locations": [{
                    "physicalLocation": {
                      "artifactLocation": { "uri": "README.md" },
                      "region": { "startLine": 1 }
                    }
                  }]
                },
                {
                  "ruleId": "FAKE-002",
                  "level": "warning",
                  "message": { "text": "Second fake finding at warning level - should map to high severity." },
                  "locations": [{
                    "physicalLocation": {
                      "artifactLocation": { "uri": "README.md" },
                      "region": { "startLine": 2 }
                    }
                  }]
                }
              ]
            }]
          }
          EOF

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84
        with:
          sarif_file: results.sarif
          category: fake-scanner-test
